<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contabilidad Financiera II — Cuaderno de Estudio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F4EC;
    --paper-line:#DCE8DD;
    --ink:#1E3448;
    --ink-soft:#4B6072;
    --red:#A73B3B;
    --green:#2F6B4F;
    --gold:#B8862B;
    --card-bg:#FFFDF8;
    --shadow:rgba(30,52,72,0.18);
    --font-display:'Special Elite', cursive;
    --font-body:'Libre Baskerville', Georgia, serif;
    --font-mono:'Courier Prime','Courier New',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--paper);
    background-image:repeating-linear-gradient(to bottom, transparent, transparent 31px, var(--paper-line) 31px, var(--paper-line) 32px);
    font-family:var(--font-body);
    color:var(--ink);
    min-height:100vh;
    line-height:1.5;
  }
  .app-shell{max-width:880px;margin:0 auto;padding:20px 20px 70px;position:relative;}
  @media (min-width:640px){
    .app-shell{padding-left:84px;}
    .app-shell::before{content:'';position:absolute;top:0;bottom:0;left:56px;width:2px;background:var(--red);opacity:0.3;}
  }
  button{font-family:inherit;}
  button:focus-visible, .option-row:focus-visible, input:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }

  /* Topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px;}
  .topbar .crumbs{font-family:var(--font-mono);font-size:0.82rem;color:var(--ink-soft);}
  .link-btn{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-family:var(--font-mono);font-size:0.85rem;text-decoration:underline;padding:4px 2px;}
  .link-btn:hover{color:var(--ink);}

  /* Home */
  .home-hero{text-align:center;padding:40px 12px 20px;}
  .home-hero .eyebrow{font-family:var(--font-mono);font-size:0.78rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;}
  .home-hero h1{font-family:var(--font-display);font-size:clamp(1.6rem,5vw,2.7rem);margin:8px 0 6px;color:var(--ink);}
  .home-hero p.subtitle{font-style:italic;color:var(--ink-soft);margin:0 0 22px;font-size:1.02rem;}
  .ledger-rule{height:2px;background:var(--gold);width:110px;margin:0 auto 30px;opacity:0.65;}
  .mode-tabs{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
  .mode-tab{background:var(--card-bg);border:2px solid var(--ink);border-radius:6px 6px 2px 2px;padding:26px 34px;min-width:190px;cursor:pointer;box-shadow:5px 5px 0 var(--shadow);transition:transform 0.15s;font-family:var(--font-display);font-size:1.05rem;color:var(--ink);text-align:center;}
  .mode-tab:hover{transform:translateY(-4px) rotate(-1deg);}
  .mode-tab .icon{display:block;font-size:2.1rem;margin-bottom:10px;}
  .mode-tab .desc{display:block;font-family:var(--font-body);font-style:italic;font-size:0.82rem;color:var(--ink-soft);margin-top:8px;}
  .home-footer{text-align:center;margin-top:44px;}

  /* Topic list */
  .section-title{font-family:var(--font-display);font-size:1.3rem;margin:6px 0 4px;}
  .section-hint{font-family:var(--font-body);font-style:italic;color:var(--ink-soft);margin:0 0 18px;font-size:0.95rem;}
  .topic-list{display:grid;gap:11px;margin-top:6px;}
  .topic-row{display:flex;align-items:center;gap:14px;background:var(--card-bg);border:1px solid var(--paper-line);border-left:4px solid var(--ink);padding:15px 17px;border-radius:3px;cursor:pointer;box-shadow:2px 2px 0 var(--shadow);transition:transform 0.12s,border-color 0.12s;text-align:left;width:100%;}
  .topic-row:hover{transform:translateX(4px);border-left-color:var(--gold);}
  .topic-row .icon{font-size:1.5rem;flex-shrink:0;}
  .topic-row .meta{flex:1;}
  .topic-row .name{font-weight:700;color:var(--ink);}
  .topic-row .count{display:block;font-family:var(--font-mono);font-size:0.75rem;color:var(--ink-soft);margin-top:2px;}
  .topic-row .badge{font-family:var(--font-mono);font-size:0.76rem;background:var(--paper);border:1px solid var(--gold);color:var(--gold);padding:3px 9px;border-radius:10px;white-space:nowrap;}
  .topic-row.general{border-left-color:var(--gold);background:linear-gradient(90deg,#FFF9EC,var(--card-bg));margin-bottom:6px;}

  /* Flashcards */
  .study-topbar{font-family:var(--font-mono);font-size:0.85rem;color:var(--ink-soft);text-align:center;margin-bottom:6px;}
  .flashcard-wrap{perspective:1300px;max-width:520px;margin:20px auto;height:300px;}
  .flashcard{position:relative;width:100%;height:100%;cursor:pointer;transition:transform 0.5s;transform-style:preserve-3d;}
  .flashcard.flipped{transform:rotateY(180deg);}
  .flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:8px;border:2px solid var(--ink);background:var(--card-bg);box-shadow:5px 5px 0 var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center;}
  .flash-face.back{transform:rotateY(180deg);background:#FBF6E8;}
  .flash-face .tag{position:absolute;top:12px;left:14px;font-family:var(--font-mono);font-size:0.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1px;}
  .flash-face .label{font-family:var(--font-mono);font-size:0.72rem;color:var(--gold);letter-spacing:1.5px;margin-bottom:12px;text-transform:uppercase;}
  .flash-face h2{font-family:var(--font-display);font-size:1.3rem;margin:0;color:var(--ink);}
  .flash-face p{font-family:var(--font-body);font-size:0.98rem;line-height:1.55;margin:0;color:var(--ink-soft);}
  .flash-hint{text-align:center;font-family:var(--font-mono);font-size:0.75rem;color:var(--ink-soft);margin-top:-10px;margin-bottom:14px;}
  .study-nav{display:flex;justify-content:center;align-items:center;gap:18px;margin-top:8px;}
  .nav-btn{background:var(--ink);color:#fff;border:none;width:42px;height:42px;border-radius:50%;font-size:1.2rem;cursor:pointer;}
  .nav-btn:disabled{opacity:0.3;cursor:default;}
  .progress-dots{font-family:var(--font-mono);font-size:0.85rem;color:var(--ink-soft);}

  /* Exam */
  .progress-bar{height:6px;background:var(--paper-line);border-radius:3px;overflow:hidden;margin-bottom:18px;}
  .progress-fill{height:100%;background:var(--gold);transition:width 0.3s;}
  .exam-paper{background:var(--card-bg);border:1px solid var(--paper-line);border-left:4px solid var(--red);border-radius:2px;padding:26px;box-shadow:4px 4px 0 var(--shadow);position:relative;}
  .exam-paper .qtag{font-family:var(--font-mono);color:var(--red);font-size:0.8rem;margin-bottom:10px;letter-spacing:0.5px;}
  .exam-paper h3{font-family:var(--font-body);font-weight:700;font-size:1.12rem;line-height:1.45;margin:0 0 20px;color:var(--ink);}
  .option-list{display:flex;flex-direction:column;gap:10px;}
  .option-row{display:flex;align-items:center;gap:12px;border:1px solid var(--paper-line);padding:12px 14px;border-radius:4px;cursor:pointer;font-family:var(--font-body);background:#fff;font-size:0.98rem;color:var(--ink);text-align:left;width:100%;}
  .option-row .letter{font-family:var(--font-mono);font-weight:700;color:var(--ink-soft);width:20px;flex-shrink:0;}
  .option-row:hover:not(:disabled){border-color:var(--ink);}
  .option-row.selected{border-color:var(--gold);background:#FFF9EC;}
  .option-row.correct{border-color:var(--green);background:#EAF5EE;}
  .option-row.incorrect{border-color:var(--red);background:#FBEAEA;}
  .option-row:disabled{cursor:default;}
  .tf-buttons{display:flex;gap:16px;}
  .tf-btn{flex:1;padding:20px;font-family:var(--font-display);font-size:1.05rem;border:2px solid var(--ink);border-radius:5px;cursor:pointer;background:#fff;color:var(--ink);}
  .tf-btn:disabled{cursor:default;}
  .tf-btn.correct{background:#EAF5EE;border-color:var(--green);color:var(--green);}
  .tf-btn.incorrect{background:#FBEAEA;border-color:var(--red);color:var(--red);}
  .numeric-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .numeric-row .prefix{font-family:var(--font-mono);font-weight:700;font-size:1.05rem;}
  .numeric-row input{font-family:var(--font-mono);font-size:1.05rem;padding:10px 12px;border:1px solid var(--ink-soft);border-radius:4px;flex:1;min-width:140px;}
  .check-btn{margin-top:16px;background:var(--ink);color:#fff;border:none;padding:11px 22px;font-family:var(--font-display);border-radius:4px;cursor:pointer;font-size:0.92rem;}
  .check-btn:disabled{opacity:0.4;cursor:default;}
  .stamp{display:inline-block;font-family:var(--font-display);border:3px double;padding:7px 16px;border-radius:6px;transform:rotate(-7deg);font-size:1.02rem;letter-spacing:1px;animation:stampIn 0.4s ease-out;margin-bottom:4px;}
  .stamp.ok{color:var(--green);border-color:var(--green);}
  .stamp.bad{color:var(--red);border-color:var(--red);}
  @keyframes stampIn{0%{transform:scale(2) rotate(-7deg);opacity:0;}60%{transform:scale(0.92) rotate(-7deg);opacity:1;}100%{transform:scale(1) rotate(-7deg);}}
  .explain-note{margin-top:14px;padding:13px 15px;background:#FFF9EC;border-left:3px solid var(--gold);font-style:italic;color:var(--ink-soft);border-radius:2px;font-size:0.94rem;}
  .exam-actions{margin-top:20px;text-align:right;}

  /* Results */
  .results-stamp-wrap{text-align:center;padding:18px 0 28px;}
  .big-stamp{display:inline-block;font-family:var(--font-display);font-size:1.5rem;border:4px double;padding:14px 28px;border-radius:10px;transform:rotate(-5deg);}
  .score-line{font-family:var(--font-mono);font-size:1.25rem;margin-top:14px;}
  .review-toggle{display:block;margin:18px auto 0;}
  .review-list{margin-top:16px;}
  .review-item{border-bottom:1px solid var(--paper-line);padding:14px 4px;}
  .review-item .rtag{font-family:var(--font-mono);font-size:0.72rem;color:var(--ink-soft);text-transform:uppercase;}
  .review-item .rq{font-weight:700;margin:4px 0 6px;}
  .review-item .ryour{font-family:var(--font-mono);font-size:0.88rem;}
  .review-item .ryour.ok{color:var(--green);}
  .review-item .ryour.bad{color:var(--red);}
  .review-item .rexplain{font-style:italic;color:var(--ink-soft);font-size:0.9rem;margin-top:6px;}

  /* Buttons */
  .btn{font-family:var(--font-display);background:var(--ink);color:#fff;border:none;padding:12px 22px;border-radius:4px;cursor:pointer;font-size:0.92rem;}
  .btn.secondary{background:transparent;color:var(--ink);border:2px solid var(--ink);}
  .btn.gold{background:var(--gold);}
  .actions-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px;justify-content:center;}
  .empty-note{text-align:center;color:var(--ink-soft);font-style:italic;padding:40px 10px;}
</style>
</head>
<body>
<div class="app-shell" id="app"></div>

<script>
/* ============== DATA ============== */
const TOPICS = [
  {id:'fundamentos', name:'Fundamentos y Ciclo Contable', icon:'📘'},
  {id:'efectivo', name:'TEMA II: El Efectivo', icon:'💵'},
  {id:'cxc', name:'TEMA 3: Cuentas por Cobrar', icon:'🧾'},
  {id:'inventario', name:'TEMA 4: Inventario', icon:'📦'},
  {id:'ppe', name:'TEMA 5: PP&E y Depreciación', icon:'🏭'},
  {id:'intangibles', name:'TEMA 6: Activos Intangibles', icon:'💡'},
  {id:'otrosactivos', name:'TEMA 7: Otros Activos', icon:'🗂️'},
  {id:'pasivos', name:'TEMA 8: Pasivos', icon:'📉'},
  {id:'patrimonio', name:'TEMA 9: Patrimonio', icon:'🏛️'},
];
function topicName(id){ const t = TOPICS.find(x=>x.id===id); return t? t.name : id; }
function topicIcon(id){ const t = TOPICS.find(x=>x.id===id); return t? t.icon : '📄'; }

const FLASHCARDS = {
  fundamentos: [
    {term:`Ecuación Contable`, def:`Activo = Pasivo + Patrimonio. Es la base de todo el sistema de partida doble: los recursos de la empresa (activos) siempre están financiados por deudas (pasivos) o por los dueños (patrimonio).`},
    {term:`Partida Doble`, def:`Cada transacción se registra en al menos dos cuentas: un débito y un crédito de igual monto. Así la ecuación contable siempre permanece en equilibrio.`},
    {term:`Principio de Devengado`, def:`Los ingresos y gastos se reconocen cuando ocurren, sin importar cuándo se cobra o se paga en efectivo. Ej.: un servicio prestado en diciembre se registra como ingreso de diciembre aunque se cobre en enero.`},
    {term:`Principio de Prudencia`, def:`Las pérdidas se registran tan pronto se conocen, pero las ganancias solo cuando se realizan efectivamente.`},
    {term:`Ciclo Contable`, def:`Proceso de nueve etapas: transacción → libro diario → libro mayor → balanza de comprobación → ajustes → balanza ajustada → estados financieros → cierre → apertura del nuevo ciclo.`},
    {term:`Los Cuatro Estados Financieros`, def:`Balance General, Estado de Resultados, Estado de Flujo de Efectivo y Estado de Cambios en el Patrimonio.`},
    {term:`Principio de Uniformidad`, def:`Las políticas contables (como el método de depreciación o de inventario) deben aplicarse igual de un período a otro para que la información sea comparable.`},
    {term:`Principio de Entidad`, def:`La contabilidad registra las operaciones de la empresa como una unidad independiente, separada de sus propietarios. Ej.: un retiro personal del dueño no afecta los registros de la empresa, solo se registra como retiro de patrimonio.`},
    {term:`Principio de Período Contable`, def:`La información financiera debe prepararse en períodos definidos (mes, trimestre, año), dividiendo la vida de la empresa para reflejar ingresos y gastos con precisión, sin importar cuándo se cobran o pagan.`},
    {term:`Principio de Comparabilidad`, def:`La información financiera de una entidad debe poder compararse con la de otros períodos propios y con la de otras entidades similares, aplicando los mismos criterios contables.`},
  ],
  efectivo: [
    {term:`Efectivo`, def:`Comprende la moneda de curso legal, nacional o extranjera, los depósitos bancarios disponibles y otros instrumentos de alta liquidez con riesgo insignificante de cambio en su valor.`},
    {term:`Clasificación del Efectivo`, def:`Efectivo en caja, depósitos bancarios (cuentas corrientes o de ahorro) y equivalentes de efectivo (inversiones a corto plazo de alta liquidez).`},
    {term:`Fondo de Caja Chica`, def:`Fondo fijo establecido para cubrir pagos menores y urgentes que no justifican la emisión de un cheque o transferencia bancaria.`},
    {term:`Conciliación Bancaria`, def:`Proceso de comparar los registros contables de la empresa con el estado de cuenta bancario para identificar y corregir discrepancias, como depósitos en tránsito o cheques pendientes.`},
    {term:`NIC 7`, def:`Norma principal sobre el efectivo. Define qué se considera efectivo y equivalentes, y clasifica los flujos en actividades operativas, de inversión y de financiación.`},
    {term:`Efectivo en Moneda Extranjera`, def:`Debe convertirse a la moneda funcional de la empresa usando el tipo de cambio oficial vigente en la fecha de los estados financieros.`},
    {term:`Presentación en el Balance`, def:`El efectivo y sus equivalentes se presentan como la primera partida del activo corriente, por su alta liquidez, a su valor nominal.`},
    {term:`Depósito en Tránsito`, def:`Depósito ya registrado en los libros de la empresa que todavía no aparece en el estado de cuenta bancario al momento de la conciliación.`},
    {term:`Instrumentos Financieros de Alta Liquidez`, def:`Instrumentos que la entidad puede convertir en efectivo de forma inmediata y con riesgo poco importante, como bonos, acciones, forwards u opciones financieras.`},
    {term:`Reposición del Fondo de Caja Chica`, def:`Al agotarse el fondo, se presentan los comprobantes de los gastos realizados y se repone exactamente el monto gastado para volver al monto fijo original.`},
  ],
  cxc: [
    {term:`Cuentas por Cobrar`, def:`Derechos exigibles a corto o largo plazo que una empresa posee frente a clientes u otras entidades por ventas de bienes o servicios a crédito.`},
    {term:`Clasificación`, def:`Comerciales (ventas ordinarias) o no comerciales (préstamos a empleados/accionistas); a corto plazo (menos de un año) o a largo plazo.`},
    {term:`Métodos de Estimación de Incobrables`, def:`Porcentaje sobre el total de cuentas por cobrar, o estimación individual analizando cada cuenta según antigüedad, historial de pago y situación del deudor.`},
    {term:`Factoring`, def:`Venta de las cuentas por cobrar a una entidad financiera para obtener liquidez inmediata. Puede ser con recurso (la empresa asume el riesgo) o sin recurso (el factor lo asume).`},
    {term:`Documentos por Cobrar`, def:`Títulos formales (letras, pagarés) que respaldan un crédito y devengan intereses.`},
    {term:`Límite Legal en RD (Ley 11-92)`, def:`La reserva para cuentas incobrables no puede exceder el 4% del saldo de cuentas por cobrar a clientes al cierre, y debe estar debidamente documentada.`},
    {term:`Presentación Neta`, def:`Las cuentas por cobrar se presentan en el activo corriente, descontando la provisión para cuentas incobrables (CxC neta = CxC bruta − provisión).`},
    {term:`Notas Aclaratorias en CxC`, def:`En las notas a los estados financieros se debe revelar la política de crédito, el método de estimación de incobrables, el detalle de clientes principales y las tasas de interés de los documentos por cobrar.`},
    {term:`Documentos por Cobrar vs. Cuentas por Cobrar`, def:`Los documentos por cobrar son títulos formales (letras, pagarés) que devengan intereses explícitos; las cuentas por cobrar comunes normalmente no generan interés.`},
    {term:`Control Interno de CxC`, def:`Incluye políticas de crédito claras, verificación de solvencia del cliente, conciliaciones periódicas y seguimiento de pagos vencidos (ej.: recordatorios automáticos de cobro).`},
  ],
  inventario: [
    {term:`Inventarios`, def:`Bienes tangibles que se mantienen para la venta en el curso ordinario del negocio, o para ser consumidos en la producción (materias primas, productos en proceso, productos terminados).`},
    {term:`NIC 2`, def:`Norma que regula cómo valorar los inventarios, los métodos permitidos (PEPS, Promedio Ponderado) y el reconocimiento del deterioro cuando el valor neto realizable es menor que el costo.`},
    {term:`PEPS (FIFO)`, def:`Primero en Entrar, Primero en Salir: los primeros inventarios comprados son los primeros en venderse.`},
    {term:`UEPS (LIFO)`, def:`Último en Entrar, Primero en Salir: los últimos inventarios comprados son los primeros en salir. No es aceptado fiscalmente por la DGII en República Dominicana.`},
    {term:`Promedio Ponderado`, def:`Se promedia el costo de todas las unidades disponibles para la venta, dividiendo el costo total entre el total de unidades.`},
    {term:`Sistema Periódico vs. Perpetuo`, def:`Periódico: el inventario se actualiza solo al final del período. Perpetuo: se actualiza continuamente con cada movimiento, por ejemplo con lector de código de barras.`},
    {term:`Inventario Obsoleto`, def:`Inventario que ha perdido valor comercial, como productos tecnológicos desfasados almacenados por mucho tiempo; se debe reconocer su deterioro.`},
    {term:`Costo Estándar vs. Costo Real`, def:`Costo estándar: costo predeterminado usado para presupuestos y control. Costo real: costo efectivamente incurrido (materiales, mano de obra, gastos generales reales).`},
    {term:`Efecto de la Inflación en Inventarios`, def:`La inflación puede alterar el valor real del inventario, afectando los costos y la utilidad si no se ajustan correctamente.`},
    {term:`Kardex o Tarjeta de Inventario`, def:`Documento que lleva el control de entradas, salidas y saldos de inventario, registrando fecha, cantidad, costo unitario y saldo.`},
  ],
  ppe: [
    {term:`Depreciación`, def:`Proceso contable que distribuye el costo de un activo fijo tangible a lo largo de su vida útil, reflejando su desgaste, uso u obsolescencia.`},
    {term:`Fórmula de Línea Recta`, def:`Depreciación anual = (Costo del activo − Valor de recuperación) ÷ Vida útil.`},
    {term:`Valor en Libros`, def:`Costo del activo menos su depreciación acumulada.`},
    {term:`Valor de Recuperación (Residual)`, def:`Importe estimado que la empresa espera obtener al final de la vida útil del activo, después de deducir los costos de venta.`},
    {term:`Métodos de Depreciación`, def:`Línea recta (gasto constante), número de dígitos (mayor gasto al inicio), horas trabajadas y unidades producidas (según el uso real del activo).`},
    {term:`Costo Capitalizable`, def:`Incluye el precio de compra más todos los costos necesarios para dejar el activo listo para su uso: instalación, transporte, montaje y pruebas.`},
    {term:`Ganancia o Pérdida en Disposición`, def:`Se calcula como la diferencia entre el valor de realización (venta) y el valor en libros del activo al momento de retirarlo.`},
    {term:`Retiro de Activos Fijos`, def:`Cuando se vende, pierde valor o se desecha un activo, se elimina el activo y su depreciación acumulada de los libros, registrando la ganancia o pérdida si aplica.`},
    {term:`Depreciación Acelerada`, def:`Se aplica cuando el ciclo de innovación u obsolescencia de un activo es muy corto (ej.: equipos de cómputo de 2-3 años), reconociendo mayor gasto en los primeros años.`},
    {term:`Causas Aceptadas de Depreciación`, def:`Uso, obsolescencia y deterioro natural son las causas que justifican depreciar un activo fijo tangible.`},
  ],
  intangibles: [
    {term:`Activo Intangible`, def:`Bien no físico que otorga beneficios económicos futuros: patentes, marcas, licencias, software, goodwill, entre otros.`},
    {term:`NIC 38`, def:`Norma que regula el reconocimiento, medición, amortización, deterioro y revelación de los activos intangibles.`},
    {term:`Requisitos de Reconocimiento`, def:`Un intangible debe ser identificable, estar controlado por la empresa y generar beneficios económicos futuros.`},
    {term:`Fórmula de Amortización`, def:`Amortización anual = Costo total del activo intangible ÷ Vida útil (en años).`},

const ALL_CARDS = TOPICS.flatMap(t => FLASHCARDS[t.id].map(c => ({...c, topicId:t.id})));
const ALL_QUESTIONS = TOPICS.flatMap(t => QUESTIONS[t.id].map(q => ({...q, topicId:t.id})));

/* ============== STATE ============== */
let state = {
  view:'loading',
  mode:null,
  topicId:null,
  cards:[], cardIndex:0, flipped:false,
  examQuestions:[], examIndex:0,
  examAnswers:[],
  answered:false, userAnswer:null, isCorrect:null,
  scores:{},
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* ============== STORAGE ============== */
async function loadScores(){
  try{
    const res = await window.storage.get('study_results', false);
    state.scores = (res && res.value) ? JSON.parse(res.value) : {};
  }catch(e){
    state.scores = {};
  }
}
async function saveAttempt(topicId, correct, total){
  if(!state.scores[topicId]) state.scores[topicId] = {attempts:[], best:{correct:0,total:1}};
  state.scores[topicId].attempts.push({correct,total,date:new Date().toISOString()});
  if(state.scores[topicId].attempts.length>10) state.scores[topicId].attempts.shift();
  const bestPct = state.scores[topicId].best.total ? state.scores[topicId].best.correct/state.scores[topicId].best.total : 0;
  const newPct = correct/total;
  if(newPct>=bestPct) state.scores[topicId].best = {correct,total};
  try{
    await window.storage.set('study_results', JSON.stringify(state.scores), false);
  }catch(e){ console.error('No se pudo guardar el progreso', e); }
}
async function resetProgress(){
  if(!confirm('¿Borrar todo tu progreso guardado (mejores puntajes)? Esta acción no se puede deshacer.')) return;
  state.scores = {};
  try{ await window.storage.set('study_results', JSON.stringify({}), false); }catch(e){}
  render();
}

/* ============== NAVIGATION ============== */
function goHome(){ state = {...state, view:'home', mode:null, topicId:null}; render(); }
function chooseMode(mode){ state.mode = mode; state.view = 'topics'; render(); }
function backToTopics(){ state.view = 'topics'; render(); }

function chooseTopic(topicId){
  state.topicId = topicId;
  if(state.mode==='study') startStudy(topicId); else startExam(topicId);
}

function startStudy(topicId){
  const pool = topicId==='general' ? ALL_CARDS : FLASHCARDS[topicId].map(c=>({...c, topicId}));
  state.cards = shuffle(pool);
  state.cardIndex = 0;
  state.flipped = false;
  state.view = 'study';
  render();
}
function shuffleStudyDeck(){
  state.cards = shuffle(state.cards);
  state.cardIndex = 0;
  state.flipped = false;
  render();
}
function flipCard(){ state.flipped = !state.flipped; render(); }
function nextCard(){ if(state.cardIndex < state.cards.length-1){ state.cardIndex++; state.flipped=false; render(); } }
function prevCard(){ if(state.cardIndex>0){ state.cardIndex--; state.flipped=false; render(); } }

function startExam(topicId){
  const pool = topicId==='general' ? shuffle(ALL_QUESTIONS).slice(0,25) : shuffle(QUESTIONS[topicId].map(q=>({...q, topicId})));
  state.examQuestions = pool;
  state.examIndex = 0;
  state.examAnswers = [];
  state.answered = false; state.userAnswer=null; state.isCorrect=null;
  state.view = 'exam';
  render();
}

function currentQuestion(){ return state.examQuestions[state.examIndex]; }

function answerMC(opt){
  if(state.answered) return;
  const q = currentQuestion();
  state.userAnswer = opt;
  state.isCorrect = (opt === q.correct);
  state.answered = true;
  state.examAnswers.push({q, userAnswer:opt, isCorrect:state.isCorrect});
  render();
}
function answerTF(val){
  if(state.answered) return;
  const q = currentQuestion();
  state.userAnswer = val;
  state.isCorrect = (val === q.correct);
  state.answered = true;
  state.examAnswers.push({q, userAnswer:val, isCorrect:state.isCorrect});
  render();
}
function checkNumericAnswer(){
  if(state.answered) return;
  const q = currentQuestion();
  const input = document.getElementById('numeric-input');
  const raw = input ? input.value : '';
  const cleaned = parseFloat(String(raw).replace(/[^0-9.\-]/g,''));
  const tol = (q.tolerance!==undefined) ? q.tolerance : 1;
  const ok = !isNaN(cleaned) && Math.abs(cleaned - q.correct) <= tol;
  state.userAnswer = isNaN(cleaned) ? '(sin respuesta)' : cleaned;
  state.isCorrect = ok;
  state.answered = true;
  state.examAnswers.push({q, userAnswer:state.userAnswer, isCorrect:ok});
  render();
}
function nextQuestion(){
  if(state.examIndex < state.examQuestions.length-1){
    state.examIndex++;
    state.answered=false; state.userAnswer=null; state.isCorrect=null;
    render();
  }else{
    const correct = state.examAnswers.filter(a=>a.isCorrect).length;
    const total = state.examAnswers.length;
    saveAttempt(state.topicId, correct, total).then(render);
    state.view = 'results';
    render();
  }
}
function retryTopic(){ startExam(state.topicId); }

/* ============== RENDER ============== */
function fmtMoney(n){ return 'RD$' + Number(n).toLocaleString('es-DO'); }

function render(){
  const app = document.getElementById('app');
  app.innerHTML = viewHTML();
}

function viewHTML(){
  switch(state.view){
    case 'loading': return `<div class="empty-note">Cargando tu cuaderno de estudio…</div>`;
    case 'home': return homeView();
    case 'topics': return topicsView();
    case 'study': return studyView();
    case 'exam': return examView();
    case 'results': return resultsView();
    default: return homeView();
  }
}

function homeView(){
  return `
    <div class="home-hero">
      <div class="eyebrow">Contabilidad Financiera II</div>
      <h1>Cuaderno de Estudio</h1>
      <p class="subtitle">Repasa los temas del curso o ponte a prueba con un mini examen</p>
      <div class="ledger-rule"></div>
      <div class="mode-tabs">
        <button class="mode-tab" onclick="chooseMode('study')">
          <span class="icon">📖</span>
          ESTUDIAR
          <span class="desc">Tarjetas de repaso por tema</span>
        </button>
        <button class="mode-tab" onclick="chooseMode('exam')">
          <span class="icon">✏️</span>
          TOMAR EXAMEN
          <span class="desc">Mini examen con corrección al instante</span>
        </button>
      </div>
    </div>
    <div class="home-footer">
      <button class="link-btn" onclick="resetProgress()">Borrar mi progreso guardado</button>
    </div>
  `;
}

function topicsView(){
  const modeLabel = state.mode==='study' ? 'Estudiar' : 'Tomar examen';
  const rows = TOPICS.map(t=>{
    const flashCount = FLASHCARDS[t.id].length;
    const qCount = QUESTIONS[t.id].length;
    const sc = state.scores[t.id];
    const badge = (state.mode==='exam' && sc && sc.best) ? `<span class="badge">Mejor: ${sc.best.correct}/${sc.best.total}</span>` : '';
    const countLabel = state.mode==='study' ? `${flashCount} tarjetas` : `${qCount} preguntas`;
    return `
      <button class="topic-row" onclick="chooseTopic('${t.id}')">
        <span class="icon">${t.icon}</span>
        <span class="meta">
          <span class="name">${t.name}</span>
          <span class="count">${countLabel}</span>
        </span>
        ${badge}
      </button>
    `;
  }).join('');

  const generalCount = state.mode==='study' ? ALL_CARDS.length : Math.min(25, ALL_QUESTIONS.length);
  const generalLabel = state.mode==='study' ? `${generalCount} tarjetas de todos los temas` : `${generalCount} preguntas mezcladas de todos los temas`;

  return `
    <div class="topbar">
      <span class="crumbs">Inicio › ${modeLabel}</span>
      <button class="link-btn" onclick="goHome()">🏠 Inicio</button>
    </div>
    <div class="section-title">¿Qué quieres repasar?</div>
    <div class="section-hint">Elige un tema específico o un repaso general mezclando todos los temas.</div>
    <button class="topic-row general" onclick="chooseTopic('general')">
      <span class="icon">🗒️</span>
      <span class="meta">
        <span class="name">General (todos los temas)</span>
        <span class="count">${generalLabel}</span>
      </span>
    </button>
    <div class="topic-list">${rows}</div>
  `;
}

function studyView(){
  const topicLabel = state.topicId==='general' ? 'Repaso General' : topicName(state.topicId);
  if(state.cards.length===0){
    return `<div class="empty-note">No hay tarjetas disponibles para este tema.</div>`;
  }
  const card = state.cards[state.cardIndex];
  const tag = state.topicId==='general' ? `${topicIcon(card.topicId)} ${topicName(card.topicId)}` : '';
  return `
    <div class="topbar">
      <span class="crumbs">Inicio › Estudiar › ${topicLabel}</span>
      <div>
        <button class="link-btn" onclick="backToTopics()">← Temas</button>
        <button class="link-btn" onclick="goHome()">🏠 Inicio</button>
      </div>
    </div>
    <div class="study-topbar">Tarjeta ${state.cardIndex+1} de ${state.cards.length}
      &nbsp;·&nbsp; <button class="link-btn" onclick="shuffleStudyDeck()">🔀 Mezclar</button>
    </div>
    <div class="flashcard-wrap">
      <div class="flashcard ${state.flipped?'flipped':''}" onclick="flipCard()">
        <div class="flash-face front">
          ${tag ? `<span class="tag">${tag}</span>` : ''}
          <span class="label">Concepto</span>
          <h2>${card.term}</h2>
        </div>
        <div class="flash-face back">
          ${tag ? `<span class="tag">${tag}</span>` : ''}
          <span class="label">Explicación</span>
          <p>${card.def}</p>
        </div>
      </div>
    </div>
    <div class="flash-hint">Toca la tarjeta para ver la explicación</div>
    <div class="study-nav">
      <button class="nav-btn" onclick="prevCard()" ${state.cardIndex===0?'disabled':''}>‹</button>
      <span class="progress-dots">${state.cardIndex+1} / ${state.cards.length}</span>
      <button class="nav-btn" onclick="nextCard()" ${state.cardIndex===state.cards.length-1?'disabled':''}>›</button>
    </div>
  `;
}

function examView(){
  const topicLabel = state.topicId==='general' ? 'Repaso General' : topicName(state.topicId);
  const q = currentQuestion();
  const total = state.examQuestions.length;
  const pct = Math.round(((state.examIndex)/total)*100);
  const tag = state.topicId==='general' ? `${topicIcon(q.topicId)} ${topicName(q.topicId)}` : '';

  let bodyHTML = '';
  if(q.type==='mc'){
    bodyHTML = `<div class="option-list">` + q.options.map((opt,i)=>{
      const letter = String.fromCharCode(97+i);
      let cls='option-row';
      if(state.answered){
        if(opt===q.correct) cls+=' correct';
        else if(opt===state.userAnswer) cls+=' incorrect';
      }
      return `<button class="${cls}" ${state.answered?'disabled':''} onclick="answerMC(\`${opt.replace(/`/g,'')}\`)"><span class="letter">${letter})</span> ${opt}</button>`;
    }).join('') + `</div>`;
  } else if(q.type==='tf'){
    let trueCls='tf-btn true-btn', falseCls='tf-btn false-btn';
    if(state.answered){
      if(q.correct===true) trueCls+=' correct'; else if(state.userAnswer===true) trueCls+=' incorrect';
      if(q.correct===false) falseCls+=' correct'; else if(state.userAnswer===false) falseCls+=' incorrect';
    }
    bodyHTML = `<div class="tf-buttons">
      <button class="${trueCls}" ${state.answered?'disabled':''} onclick="answerTF(true)">VERDADERO</button>
      <button class="${falseCls}" ${state.answered?'disabled':''} onclick="answerTF(false)">FALSO</button>
    </div>`;
  } else if(q.type==='numeric'){
    bodyHTML = `<div class="numeric-row">
      <span class="prefix">RD$</span>
      <input id="numeric-input" type="text" inputmode="decimal" placeholder="Escribe tu respuesta" ${state.answered?'disabled':''} value="${state.answered && state.userAnswer!=='(sin respuesta)' ? state.userAnswer : ''}">
    </div>
    ${!state.answered ? `<button class="check-btn" onclick="checkNumericAnswer()">Comprobar</button>` : ''}
    ${state.answered ? `<div style="margin-top:10px;font-family:var(--font-mono);font-size:0.9rem;color:var(--ink-soft);">Respuesta correcta: ${fmtMoney(q.correct)}</div>` : ''}
    `;
  }

  const feedback = state.answered ? `
    <div class="stamp ${state.isCorrect?'ok':'bad'}">${state.isCorrect?'✓ CORRECTO':'✕ REVISAR'}</div>
    <div class="explain-note">${q.explain}</div>
  ` : '';

  const isLast = state.examIndex===total-1;

  return `
    <div class="topbar">
      <span class="crumbs">Inicio › Examen › ${topicLabel}</span>
      <div>
        <button class="link-btn" onclick="backToTopics()">← Salir</button>
        <button class="link-btn" onclick="goHome()">🏠 Inicio</button>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="exam-paper">
      <div class="qtag">Pregunta ${state.examIndex+1} de ${total}${tag ? ' · '+tag : ''}</div>
      <h3>${q.q}</h3>
      ${bodyHTML}
      ${feedback}
      ${state.answered ? `<div class="exam-actions"><button class="btn" onclick="nextQuestion()">${isLast ? 'Ver resultados' : 'Siguiente pregunta →'}</button></div>` : ''}
    </div>
  `;
}

function resultsView(){
  const correct = state.examAnswers.filter(a=>a.isCorrect).length;
  const total = state.examAnswers.length;
  const pct = total ? Math.round((correct/total)*100) : 0;
  let tier, cls;
  if(pct>=90){tier='¡EXCELENTE!'; cls='ok';}
  else if(pct>=75){tier='MUY BIEN'; cls='ok';}
  else if(pct>=60){tier='APROBADO'; cls='ok';}
  else {tier='A REPASAR'; cls='bad';}

  const topicLabel = state.topicId==='general' ? 'Repaso General' : topicName(state.topicId);

  const reviewItems = state.examAnswers.map((a,i)=>{
    const q = a.q;
    let yourAnsText;
    if(q.type==='mc') yourAnsText = a.userAnswer;
    else if(q.type==='tf') yourAnsText = a.userAnswer ? 'Verdadero' : 'Falso';
    else yourAnsText = (a.userAnswer==='(sin respuesta)') ? 'Sin respuesta' : fmtMoney(a.userAnswer);
    const tag = state.topicId==='general' ? `${topicIcon(q.topicId)} ${topicName(q.topicId)}` : '';
    return `
      <div class="review-item">
        ${tag ? `<div class="rtag">${tag}</div>` : ''}
        <div class="rq">${i+1}. ${q.q}</div>
        <div class="ryour ${a.isCorrect?'ok':'bad'}">${a.isCorrect?'✓':'✕'} Tu respuesta: ${yourAnsText}</div>
        <div class="rexplain">${q.explain}</div>
      </div>
    `;
  }).join('');

  return `
    <div class="topbar">
      <span class="crumbs">Inicio › Examen › ${topicLabel} › Resultados</span>
      <button class="link-btn" onclick="goHome()">🏠 Inicio</button>
    </div>
    <div class="results-stamp-wrap">
      <div class="big-stamp ${cls==='ok'?'ok':'bad'}" style="${cls==='ok'?'color:var(--green);border-color:var(--green);':'color:var(--red);border-color:var(--red);'}">${tier}</div>
      <div class="score-line">${correct} / ${total} correctas (${pct}%)</div>
    </div>
    <div class="actions-row">
      <button class="btn" onclick="retryTopic()">Intentar de nuevo</button>
      <button class="btn secondary" onclick="backToTopics()">Otro tema</button>
      <button class="btn gold" onclick="goHome()">Inicio</button>
    </div>
    <details class="review-list">
      <summary class="review-toggle" style="cursor:pointer;font-family:var(--font-mono);text-align:center;color:var(--ink-soft);">Ver revisión completa de las preguntas ▾</summary>
      ${reviewItems}
    </details>
  `;
}

/* ============== INIT ============== */
(async function init(){
  await loadScores();
  state.view = 'home';
  render();
})();
</script>
</body>
</html>
